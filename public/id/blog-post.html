<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Blog — PT Ambara Artha Globaltrans</title>
  <meta name="description" id="page-desc" content="Air freight insights from PT Ambara Artha Globaltrans">
  <link rel="canonical" id="page-canonical" href="/id/blog-post">
  <link rel="alternate" hreflang="en" id="alt-en" href="/id/blog-post">
  <link rel="alternate" hreflang="id" id="alt-id" href="https://ambaraartha.com/id/blog-post">
  <script type="application/ld+json" id="article-schema"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .prose h2 { font-size: 1.5rem; margin: 40px 0 16px; }
    .prose h3 { font-size: 1.25rem; margin: 32px 0 12px; }
    .prose p { margin-bottom: 20px; color: var(--text-muted); }
    .prose ul, .prose ol { margin: 0 0 20px 24px; color: var(--text-muted); line-height: 1.75; }
    .prose li { margin-bottom: 8px; }
    .prose strong { color: var(--text); }
    .prose blockquote { border-left: 3px solid var(--blue); padding: 16px 20px; background: rgba(17,34,238,0.05); border-radius: 0 8px 8px 0; margin: 24px 0; }
    .prose table { width: 100%; border-collapse: collapse; margin: 24px 0; }
    .prose th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 0.875rem; }
    .prose td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.9375rem; color: var(--text-muted); }
  </style>
</head>
<body>
<div id="navbar-mount"></div>

<div id="post-container" style="padding-top:80px">
  <div style="text-align:center;padding:120px 0;color:var(--text-muted)">
    <div style="width:32px;height:32px;border:3px solid var(--blue);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>
    Loading...
  </div>
</div>

<div id="footer-mount"></div>
<script src="/layout.js?v=2.1"></script>
<script src="/app.js?v=2.1"></script>
<script>
document.getElementById('navbar-mount').innerHTML = AMBARA.getNavbar('blog');
document.getElementById('footer-mount').innerHTML = AMBARA.getFooter();

const slug = new URLSearchParams(window.location.search).get('slug');
if (!slug) window.location.href = '/en/blog.html';

fetch(`/api/blog-api?action=post&slug=${slug}`).then(r => {
  if (!r.ok) throw new Error('Not found');
  return r.json();
}).then(post => {
  // Update SEO tags
  document.getElementById('page-title').textContent = `${post.title_en} | PT Ambara Artha Globaltrans`;
  document.getElementById('page-desc').content = post.meta_description_en || post.excerpt_en;
  document.getElementById('page-canonical').href = `https://ambaraartha.com/en/blog-post.html?slug=${slug}`;
  document.getElementById('alt-en').href = `https://ambaraartha.com/en/blog-post.html?slug=${slug}`;
  document.getElementById('alt-id').href = `https://ambaraartha.com/id/blog-post.html?slug=${slug}`;

  // Article schema
  document.getElementById('article-schema').textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": post.title_en,
    "description": post.excerpt_en,
    "author": { "@type": "Organization", "name": "PT Ambara Artha Globaltrans" },
    "publisher": { "@type": "Organization", "name": "PT Ambara Artha Globaltrans", "url": "https://ambaraartha.com" },
    "datePublished": post.published_at,
    "dateModified": post.updated_at || post.published_at,
    "url": `https://ambaraartha.com/en/blog-post.html?slug=${slug}`
  });

  const relatedHtml = (post.related||[]).map(r => `
    <a href="/id/blog-post.html?slug=${r.slug}" class="card" style="display:block;text-decoration:none">
      <div class="badge badge-blue" style="margin-bottom:12px">${r.category}</div>
      <div style="font-weight:700;font-size:0.9375rem;margin-bottom:8px">${r.title_en}</div>
      <div style="font-size:0.8125rem;color:var(--text-muted)">${new Date(r.published_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    </a>`).join('');

  document.getElementById('post-container').innerHTML = `
    <section style="padding:40px 0 60px">
      <div class="container" style="max-width:760px">
        <div style="margin-bottom:24px">
          <a href="/id/blog" style="color:var(--text-muted);font-size:0.875rem">← Back to Blog</a>
        </div>
        <div class="badge badge-blue" style="margin-bottom:20px">${post.category}</div>
        <h1 style="margin-bottom:20px">${post.title_en}</h1>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border)">
          <div style="width:40px;height:40px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800">A</div>
          <div>
            <div style="font-weight:600">${post.author||'Ambara Artha Team'}</div>
            <div style="font-size:0.8125rem;color:var(--text-muted)">${new Date(post.published_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
          </div>
        </div>
        ${post.cover_image_url ? `<img src="${post.cover_image_url}" alt="${post.title_en}" style="width:100%;border-radius:16px;margin-bottom:40px">` : ''}
        <div class="prose">${post.content_en||''}</div>
        ${post.tags ? `<div style="margin-top:40px;padding-top:24px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">${post.tags.split(',').map(t=>`<span class="badge badge-blue">${t.trim()}</span>`).join('')}</div>` : ''}
      </div>
    </section>
    ${relatedHtml ? `
    <section class="section-sm" style="background:var(--surface);border-top:1px solid var(--border)">
      <div class="container">
        <h3 style="margin-bottom:24px">Related Articles</h3>
        <div class="grid-3">${relatedHtml}</div>
      </div>
    </section>` : ''}
    <section class="section-sm">
      <div class="container" style="max-width:760px">
        <div class="card" style="text-align:center;background:linear-gradient(135deg,var(--surface),rgba(17,34,238,0.05))">
          <h3 style="margin-bottom:12px">Siap Mengirim?</h3>
          <p style="margin-bottom:24px">Get a free quote from our team within 2 hours.</p>
          <a href="/id/quote" class="btn btn-primary">Dapatkan Penawaran Gratis →</a>
        </div>
      </div>
    </section>`;
}).catch(() => {
  document.getElementById('post-container').innerHTML = `
    <div style="text-align:center;padding:120px 24px">
      <h2 style="margin-bottom:16px">Post Not Found</h2>
      <p style="margin-bottom:24px">The article you're looking for doesn't exist.</p>
      <a href="/id/blog" class="btn btn-primary">← Back to Blog</a>
    </div>`;
});
</script>
</body>
</html>
